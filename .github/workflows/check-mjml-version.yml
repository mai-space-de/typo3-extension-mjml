name: Check MJML Version

on:
  # Run every Monday at 08:00 UTC
  schedule:
    - cron: "0 8 * * 1"
  # Allow manual triggering
  workflow_dispatch:

jobs:
  check-mjml-version:
    name: Check for new stable MJML release
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine current and latest MJML versions
        id: versions
        run: |
          CURRENT=$(node -e "const p = require('./package.json'); console.log(p.dependencies.mjml)")
          LATEST=$(npm view mjml version)
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}"   >> "$GITHUB_OUTPUT"
          if [ "${CURRENT}" != "${LATEST}" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log version information
        run: |
          echo "Current MJML version in package.json : ${{ steps.versions.outputs.current }}"
          echo "Latest stable MJML version on npm    : ${{ steps.versions.outputs.latest }}"
          echo "Update needed                        : ${{ steps.versions.outputs.update_needed }}"

      - name: Create issue when a newer version is available
        if: steps.versions.outputs.update_needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Update MJML to v${{ steps.versions.outputs.latest }}`;

            // Avoid duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'dependencies',
            });
            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              core.info(`Issue already exists: ${duplicate.html_url}`);
              return;
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body: [
                '## New stable MJML release detected',
                '',
                `| | Version |`,
                `|---|---|`,
                `| **Current** (package.json) | \`${{ steps.versions.outputs.current }}\` |`,
                `| **Latest** (npm)           | \`${{ steps.versions.outputs.latest }}\` |`,
                '',
                '### Steps to update',
                '',
                '1. Update the `mjml` version in `package.json`.',
                '2. Run `npm install` and verify the output.',
                '3. Run the full test suite.',
                '4. Update `Documentation/Changelog/Index.rst`.',
              ].join('\n'),
              labels: ['dependencies', 'mjml'],
            });
            core.info(`Created issue: ${issue.html_url}`);
