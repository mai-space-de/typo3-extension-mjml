name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # PHP Lint (PHP-CS-Fixer in dry-run mode)
  # ---------------------------------------------------------------------------
  php-lint:
    name: "PHP Lint (PHP ${{ matrix.php-version }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHP-CS-Fixer (dry-run)
        run: composer lint

  # ---------------------------------------------------------------------------
  # Static Analysis – PHPStan
  # ---------------------------------------------------------------------------
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPStan
        run: composer stan

  # ---------------------------------------------------------------------------
  # Unit Tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: "Unit Tests (PHP ${{ matrix.php-version }}, TYPO3 ${{ matrix.typo3-version }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.2"
            typo3-version: "^13.4"
          - php-version: "8.3"
            typo3-version: "^13.4"
          - php-version: "8.2"
            typo3-version: "^14.0"
          - php-version: "8.3"
            typo3-version: "^14.0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none

      - name: Install Composer dependencies (TYPO3 ${{ matrix.typo3-version }})
        run: |
          composer require --no-update "typo3/cms-core:${{ matrix.typo3-version }}"
          composer install --no-interaction --no-progress

      - name: Run unit tests
        run: composer test
