name: Check TYPO3 Version

on:
  # Run every Monday at 08:30 UTC (offset from MJML check)
  schedule:
    - cron: "30 8 * * 1"
  # Allow manual triggering
  workflow_dispatch:

jobs:
  check-typo3-version:
    name: Check for new stable TYPO3 releases
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # Check both supported LTS / stable branches
        typo3-branch: ["13", "14"]

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest stable TYPO3 ${{ matrix.typo3-branch }} release
        id: typo3
        run: |
          BRANCH="${{ matrix.typo3-branch }}"
          LATEST=$(curl -fsSL "https://get.typo3.org/api/v1/release/latest/${BRANCH}" \
            | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('version', 'unknown'))")
          echo "branch=${BRANCH}"   >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}"   >> "$GITHUB_OUTPUT"

      - name: Read currently supported TYPO3 range from composer.json
        id: composer
        run: |
          RANGE=$(node -e "const c = require('./composer.json'); console.log(c.require['typo3/cms-core'] || '')")
          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"

      - name: Log version information
        run: |
          echo "TYPO3 branch checked      : ${{ steps.typo3.outputs.branch }}"
          echo "Latest stable release     : ${{ steps.typo3.outputs.latest }}"
          echo "Composer constraint       : ${{ steps.composer.outputs.range }}"

      - name: Create issue when a new release is detected
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.typo3.outputs.branch }}';
            const latest = '${{ steps.typo3.outputs.latest }}';
            const range  = '${{ steps.composer.outputs.range }}';

            if (!latest || latest === 'unknown') {
              core.warning(`Could not determine latest TYPO3 ${branch} version`);
              return;
            }

            const title = `Verify compatibility with TYPO3 v${latest}`;

            // Avoid duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'dependencies',
            });
            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              core.info(`Issue already exists: ${duplicate.html_url}`);
              return;
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body: [
                `## New TYPO3 ${branch}.x release detected`,
                '',
                `| | Version |`,
                `|---|---|`,
                `| **Latest TYPO3 ${branch}.x** | \`${latest}\` |`,
                `| **Composer constraint**       | \`${range}\` |`,
                '',
                '### Steps to verify',
                '',
                `1. Spin up a TYPO3 ${latest} instance and install EXT:mai_mjml.`,
                '2. Run the full test suite against this TYPO3 version.',
                '3. If compatible, update `ext_emconf.php` and `composer.json` if the version is outside the current range.',
                '4. Update `Documentation/Introduction/Index.rst` supported versions table.',
                '5. Update `Documentation/Changelog/Index.rst`.',
              ].join('\n'),
              labels: ['dependencies', 'typo3'],
            });
            core.info(`Created issue: ${issue.html_url}`);
